name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      # Verify environment
      - name: Check environment
        run: |
          java -version
          flutter doctor -v

      # Build universal APK (works on all devices)
      - name: Build universal APK
        run: flutter build apk --release -v 2>&1 | tee build.log; if [ ${PIPESTATUS[0]} -ne 0 ]; then echo "=== LAST 100 LINES OF BUILD LOG ==="; tail -100 build.log; exit 1; fi

      # List output to verify APK exists
      - name: List APK output
        run: ls -la build/app/outputs/flutter-apk/

      # Create GitHub Release with APK
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
