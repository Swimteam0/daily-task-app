name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: dart analyze lib/
      - run: flutter test

      # Build split APKs (smaller per device)
      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      # Copy split APKs to temp location before universal build overwrites them
      - name: Copy split APKs
        run: |
          mkdir -p /tmp/apks
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk /tmp/apks/ 2>/dev/null || true
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk /tmp/apks/ 2>/dev/null || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk /tmp/apks/ 2>/dev/null || true

      # Build universal APK (works on all devices, larger)
      - name: Build universal APK
        run: flutter build apk --release

      # Copy universal APK
      - name: Copy universal APK
        run: cp build/app/outputs/flutter-apk/app-release.apk /tmp/apks/

      # Create GitHub Release with all APKs
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/apks/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
